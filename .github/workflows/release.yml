name: Release

on:
  push:
    tags: ["v*"]

jobs:
  # Reuse CI's test + prebuilds jobs. The tag ref makes their guard pass, and
  # the uploaded `prebuilds` artifact is shared within this run.
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - uses: actions/download-artifact@v6
        with:
          name: prebuilds
          path: prebuilds/
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
      - name: Verify all prebuilds are present
        run: |
          for d in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64; do
            test -f "prebuilds/$d/serial.node" || { echo "::error::missing prebuilds/$d/serial.node"; exit 1; }
          done
      - run: npm ci
      # prepack (clean + build:ts) runs automatically during publish.
      - run: npm publish --provenance --access public
