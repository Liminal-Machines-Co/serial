name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: # reused by release.yml on a tag

# Guard: run on a tag ref (release reuse) OR when the commit is not the
# `npm version` release commit. Skips the release commit's own branch push
# (which arrives alongside the tag) so CI runs once per release, via the tag.
# PR events have a null head_commit, so the negated startsWith passes.
jobs:
  test:
    if: ${{ startsWith(github.ref, 'refs/tags/') || !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: oven-sh/setup-bun@v2
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: npm ci
      - run: npm run typecheck
      - run: npm run typecheck:test
      - run: npm test # unit tests (bun)
      - name: integration tests (socat PTY pair + native addon)
        run: |
          sudo apt-get update && sudo apt-get install -y socat
          npm run build:native
          npm run test:integration

  prebuilds:
    # Zig cross-compiles every target from a single runner — no per-OS matrix.
    if: ${{ startsWith(github.ref, 'refs/tags/') || !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: npm run build:prebuilds
      - uses: actions/upload-artifact@v6
        with:
          name: prebuilds
          path: prebuilds/
